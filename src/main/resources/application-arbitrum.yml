rpc:
  mode: arbitrum
  mode-type: optimism
  title: "Arbitrum One"
  title-color: "#213147"
  get-safe-blocks: false
  get-finalized-blocks: true
  scale-change-ms: 250
  scale-max-ms: 15000
  anomaly-detection:
    high-latency-ms: 1000
    long-delay-block-count: 30
    # Arbitrum Nitro produces blocks every ~250ms — tight ageMs tolerance, generous block-gap
    stale-block-threshold-ms: 5000
    block-gap-threshold: 20
  # Polling intervals: optimal = 500ms (Arbitrum block time is ~0.25s; 500ms is a public-RPC rate-limit compromise), sparse = 30s
  requests:
    optimal-poll-interval-ms: 500
    sparse-poll-interval-ms: 30000
  nodes:
    - name: arb1.arbitrum.io
      http: https://arb1.arbitrum.io/rpc
    - name: publicnode.com
      http: https://arbitrum-one-rpc.publicnode.com
      ws: wss://arbitrum-one-rpc.publicnode.com
      requests: sparse
    - name: drpc.org
      http: https://arbitrum.drpc.org
      ws: wss://arbitrum.drpc.org
      requests: sparse
    - name: tenderly.co
      http: https://arbitrum.gateway.tenderly.co
      ws: wss://arbitrum.gateway.tenderly.co
      requests: sparse
    - name: 1RPC
      http: https://1rpc.io/arb
      requests: sparse
    - name: BlastAPI
      http: https://arbitrum-one.public.blastapi.io
      ws: wss://arbitrum-one.public.blastapi.io
      requests: sparse
    - name: LlamaNodes
      http: https://arbitrum.llamarpc.com
      ws: wss://arbitrum.llamarpc.com
      requests: sparse
